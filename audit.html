<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Аудит перевозчика за 2 минуты | GRUZAPP</title>
<link rel="stylesheet" href="cta.css">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Unbounded:wght@500;700;900&family=Inter:wght@400;500;600&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Inter', sans-serif; background: #000; color: #fff; line-height: 1.6; }
  .container { max-width: 720px; margin: 0 auto; padding: 24px 20px 60px; }
  .logo { font-family: 'Unbounded', sans-serif; font-size: 18px; font-weight: 900; margin-bottom: 48px; }
  .logo span { color: #c6ff00; }
  .hero { padding: 32px 0 48px; text-align: center; }
  .hero-kicker { display: inline-block; background: rgba(198,255,0,0.12); color: #c6ff00; font-size: 12px; font-weight: 600; padding: 6px 14px; border-radius: 20px; margin-bottom: 24px; text-transform: uppercase; letter-spacing: 0.04em; }
  .hero h1 { font-family: 'Unbounded', sans-serif; font-size: clamp(28px, 5vw, 42px); font-weight: 700; line-height: 1.15; margin-bottom: 20px; }
  .hero h1 .accent { color: #c6ff00; }
  .hero p { font-size: 17px; color: #999; max-width: 580px; margin: 0 auto; }
  .content { display: none; }
  .content.show { display: block; }
  .progress-bar { height: 6px; background: #1f1f1f; border-radius: 3px; overflow: hidden; margin-bottom: 24px; }
  .progress-fill { height: 100%; background: #c6ff00; width: 0%; transition: width 0.25s; }
  .q-card { background: #0d0d0d; border: 1px solid #1f1f1f; border-radius: 12px; padding: 18px 20px; margin-bottom: 12px; }
  .q-head { display: flex; align-items: flex-start; gap: 12px; margin-bottom: 12px; }
  .q-num { width: 26px; height: 26px; background: #c6ff00; color: #000; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; flex-shrink: 0; }
  .q-text { font-size: 14px; font-weight: 600; line-height: 1.5; }
  .answers { display: flex; flex-direction: column; gap: 8px; margin-bottom: 10px; }
  .ans-btn { padding: 10px 14px; font-size: 13px; font-weight: 500; border-radius: 8px; border: 1px solid #2a2a2a; background: transparent; color: #999; cursor: pointer; text-align: left; font-family: inherit; transition: all 0.15s; }
  .ans-btn:hover { border-color: #444; color: #fff; }
  .ans-btn.sel-good { background: #c6ff00; border-color: #c6ff00; color: #000; font-weight: 600; }
  .ans-btn.sel-mid { background: rgba(255,255,255,0.08); border-color: #fff; color: #fff; font-weight: 600; }
  .ans-btn.sel-bad { background: rgba(255,80,80,0.1); border-color: #ff6666; color: #ff9999; font-weight: 600; }
  .flag { font-size: 12px; color: #666; padding-left: 38px; }
  .result { border-radius: 16px; padding: 28px; text-align: center; margin: 24px 0; display: none; }
  .result.good { background: #c6ff00; color: #000; }
  .result.mid { background: #fff; color: #000; }
  .result.bad { background: #0d0d0d; border: 1px solid #ff6666; color: #ff9999; }
  .result-label { font-size: 12px; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 8px; opacity: 0.7; }
  .result-score { font-family: 'Unbounded', sans-serif; font-size: 42px; font-weight: 900; line-height: 1.1; }
  .result-text { font-size: 14px; line-height: 1.6; margin-top: 12px; opacity: 0.85; }
  footer { text-align: center; margin-top: 48px; padding-top: 32px; border-top: 1px solid #1f1f1f; font-size: 12px; color: #666; }
</style>
</head>
<body>
<div class="container">
  <a href="/" style="text-decoration:none; color:inherit;"><div class="logo">GRUZ<span>APP</span></div></a>
  <div class="hero">
    <div class="hero-kicker">Аудит за 2 минуты</div>
    <h1>Проверь свою службу <span class="accent">доставки</span></h1>
    <p>7 вопросов — и ты знаешь, можно ли ей доверять.</p>
  </div>

  <div id="gate"></div>

  <div id="content" class="content">
    <div class="progress-bar"><div class="progress-fill" id="prog"></div></div>
    <div id="questions"></div>
    <div class="result" id="result">
      <div class="result-label" id="r-label"></div>
      <div class="result-score" id="r-score"></div>
      <div class="result-text" id="r-text"></div>
    </div>
    <div id="cta"></div>
  </div>

  <footer>GRUZAPP · © 2025</footer>
</div>

<script src="app.js"></script>
<script>
const Q = [
  { q: "Как формируется итоговая цена?", good: "Фиксируется до рейса", mid: "По тарифу + доплаты", bad: "На месте", flag: "«По факту» = красный флаг" },
  { q: "Кто приедет — ваши или субподряд?", good: "Верифицированные водители", mid: "Иногда привлекаем", bad: "Найдём команду", flag: "Уклончивость = риск" },
  { q: "Фото груза до погрузки?", good: "Стандарт", mid: "Если попросите", bad: "Не делаем", flag: "Без фото — не докажешь" },
  { q: "Реальная страховка?", good: "Суммы и условия", mid: "Уточним", bad: "Всё застраховано", flag: "«Есть» ≠ «выплатят»" },
  { q: "Как считаете грузчиков?", good: "По фото/списку", mid: "По телефону", bad: "Хватит одной машины", flag: "На слух = переплата" },
  { q: "Выходные?", good: "Без наценки", mid: "С наценкой", bad: "Только будни", flag: "Сервис подстраивается" },
  { q: "Если повредят?", good: "Алгоритм + сроки", mid: "Рассмотрим", bad: "Не бывает", flag: "Без алгоритма — без денег" }
];
const answers = new Array(7).fill(null);

function showContent() {
  document.getElementById('content').classList.add('show');
  render();
}

function render() {
  document.getElementById('questions').innerHTML = Q.map((q, i) => `
    <div class="q-card">
      <div class="q-head"><div class="q-num">${i+1}</div><div class="q-text">${q.q}</div></div>
      <div class="answers">
        <button class="ans-btn" data-i="${i}" data-v="good">${q.good}</button>
        <button class="ans-btn" data-i="${i}" data-v="mid">${q.mid}</button>
        <button class="ans-btn" data-i="${i}" data-v="bad">${q.bad}</button>
      </div>
      <div class="flag">⚑ ${q.flag}</div>
    </div>`).join('');
  document.querySelectorAll('.ans-btn').forEach(b => b.addEventListener('click', () => {
    answers[+b.dataset.i] = b.dataset.v;
    document.querySelectorAll(`.ans-btn[data-i="${b.dataset.i}"]`).forEach(x => x.classList.remove('sel-good','sel-mid','sel-bad'));
    b.classList.add('sel-' + b.dataset.v);
    update();
  }));
}

function update() {
  const a = answers.filter(x => x !== null).length;
  document.getElementById('prog').style.width = (a / 7 * 100) + '%';
  if (a < 7) { document.getElementById('result').style.display='none'; document.getElementById('cta').innerHTML=''; return; }
  let s = 0; answers.forEach(x => { if (x === 'good') s += 2; else if (x === 'mid') s += 1; });
  const r = document.getElementById('result'); r.style.display = 'block';
  r.classList.remove('good','mid','bad');
  document.getElementById('r-score').textContent = s + ' / 14';
  if (s >= 11) { r.classList.add('good'); document.getElementById('r-label').textContent = 'Зелёная зона'; document.getElementById('r-text').textContent = 'Базовые стандарты ок. Проверяй фото, страховку и алгоритм.'; }
  else if (s >= 7) { r.classList.add('mid'); document.getElementById('r-label').textContent = 'Жёлтая зона'; document.getElementById('r-text').textContent = 'Слабые места есть. Фиксируй груз сам.'; }
  else { r.classList.add('bad'); document.getElementById('r-label').textContent = 'Красная зона'; document.getElementById('r-text').textContent = 'Не защищает. Ищи альтернативу.'; }
  GRUZAPP.renderCTA('cta', 'audit', 'Хочешь сравнить?', 'В GRUZAPP все 7 пунктов в стандарте.');
}

window.addEventListener('DOMContentLoaded', () => GRUZAPP.renderGate('gate', 'audit', showContent));
</script>
</body>
</html>
