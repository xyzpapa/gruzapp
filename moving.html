<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>План переезда за 3 дня | GRUZAPP</title>
<link rel="stylesheet" href="cta.css">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Unbounded:wght@500;700;900&family=Inter:wght@400;500;600&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Inter', sans-serif; background: #000; color: #fff; line-height: 1.6; }
  .container { max-width: 720px; margin: 0 auto; padding: 24px 20px 60px; }
  .logo { font-family: 'Unbounded', sans-serif; font-size: 18px; font-weight: 900; margin-bottom: 48px; }
  .logo span { color: #c6ff00; }
  .hero { padding: 32px 0 48px; text-align: center; }
  .hero-kicker { display: inline-block; background: rgba(198,255,0,0.12); color: #c6ff00; font-size: 12px; font-weight: 600; padding: 6px 14px; border-radius: 20px; margin-bottom: 24px; text-transform: uppercase; letter-spacing: 0.04em; }
  .hero h1 { font-family: 'Unbounded', sans-serif; font-size: clamp(28px, 5vw, 42px); font-weight: 700; line-height: 1.15; margin-bottom: 20px; }
  .hero h1 .accent { color: #c6ff00; }
  .hero p { font-size: 17px; color: #999; max-width: 580px; margin: 0 auto; }
  .content { display: none; }
  .content.show { display: block; }
  .progress-block { background: #0d0d0d; border: 1px solid #1f1f1f; border-radius: 12px; padding: 18px 20px; margin-bottom: 24px; }
  .progress-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
  .progress-label { font-size: 13px; color: #999; }
  .progress-num { font-family: 'Unbounded', sans-serif; font-size: 22px; font-weight: 700; color: #c6ff00; }
  .progress-bar { height: 6px; background: #000; border-radius: 3px; overflow: hidden; }
  .progress-fill { height: 100%; background: #c6ff00; width: 0%; transition: width 0.25s; }
  .reset-btn { font-size: 12px; color: #666; background: transparent; border: none; cursor: pointer; margin-left: 8px; }
  .day { background: #0d0d0d; border: 1px solid #1f1f1f; border-radius: 12px; padding: 22px; margin-bottom: 12px; }
  .day-head { display: flex; align-items: center; gap: 12px; margin-bottom: 6px; }
  .day-num { background: #c6ff00; color: #000; font-size: 11px; font-weight: 700; text-transform: uppercase; padding: 4px 10px; border-radius: 4px; }
  .day-title { font-size: 17px; font-weight: 600; }
  .day-sub { font-size: 13px; color: #999; margin-bottom: 16px; }
  .section-head { font-size: 12px; font-weight: 600; color: #999; letter-spacing: 0.04em; text-transform: uppercase; margin: 14px 0 6px; }
  .section-head:first-of-type { margin-top: 0; }
  .task { display: flex; align-items: flex-start; gap: 10px; padding: 8px 0; font-size: 13px; cursor: pointer; line-height: 1.5; border-bottom: 1px solid #1a1a1a; }
  .task:last-child { border-bottom: none; }
  .check-box { width: 18px; height: 18px; border: 1.5px solid #444; border-radius: 4px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-top: 1px; }
  .check-box.on { background: #c6ff00; border-color: #c6ff00; color: #000; font-weight: 700; }
  .task.on .task-text { text-decoration: line-through; color: #666; }
  .mistakes { background: rgba(255,255,255,0.04); border: 1px solid #2a2a2a; border-radius: 12px; padding: 22px; margin: 24px 0; }
  .mistakes-title { font-size: 14px; font-weight: 600; margin-bottom: 12px; }
  .mistake { font-size: 13px; color: #ccc; padding: 6px 0; display: flex; gap: 8px; }
  .mistake-num { font-weight: 700; color: #c6ff00; flex-shrink: 0; }
  footer { text-align: center; margin-top: 48px; padding-top: 32px; border-top: 1px solid #1f1f1f; font-size: 12px; color: #666; }
</style>
</head>
<body>
<div class="container">
  <a href="/" style="text-decoration:none; color:inherit;"><div class="logo">GRUZ<span>APP</span></div></a>
  <div class="hero">
    <div class="hero-kicker">План переезда</div>
    <h1>Переезд за 3 дня <span class="accent">без хаоса</span></h1>
    <p>Конкретные действия по дням с трекером готовности.</p>
  </div>

  <div id="gate"></div>

  <div id="content" class="content">
    <div class="progress-block">
      <div class="progress-row">
        <div class="progress-label">Готовность</div>
        <div style="display:flex; align-items:center;">
          <div class="progress-num" id="pct">0%</div>
          <button class="reset-btn" id="reset">сбросить</button>
        </div>
      </div>
      <div class="progress-bar"><div class="progress-fill" id="fill"></div></div>
    </div>
    <div id="days"></div>
    <div class="mistakes">
      <div class="mistakes-title">Три главные ошибки</div>
      <div class="mistake"><span class="mistake-num">1.</span>Машину «на глаз» без оценки</div>
      <div class="mistake"><span class="mistake-num">2.</span>Подписать накладную не осмотрев</div>
      <div class="mistake"><span class="mistake-num">3.</span>Не взять прямой номер водителя</div>
    </div>
    <div id="cta"></div>
  </div>

  <footer>GRUZAPP · © 2025</footer>
</div>

<script src="app.js"></script>
<script>
const plan = [
  { label: "За 3 дня", title: "Подготовка", sub: "Что везём, что выбрасываем, кто повезёт", sections: [
    { head: "Вещи", tasks: ["Пройти комнаты: везём / выбрасываем / отдаём", "Список мебели для разборки", "Фото вещей для оценки объёма"] },
    { head: "Документы", tasks: ["Документы на технику", "Договор с новым жильём"] },
    { head: "Перевозчик", tasks: ["Заказать машину + грузчиков", "Фиксируют ли состояние вещей?", "Прямой номер водителя"] }
  ]},
  { label: "За 1 день", title: "Сборы", sub: "Упаковка, подтверждение, обе квартиры", sections: [
    { head: "Упаковка", tasks: ["Упаковать всё кроме нужного утром", "Подписать коробки", "Тяжёлое — в маленькие коробки", "Технику — с плёнкой"] },
    { head: "Логистика", tasks: ["Подтвердить время", "Парковка у нового дома", "Предупредить соседей"] },
    { head: "Документы", tasks: ["Фото счётчиков", "Ключи"] }
  ]},
  { label: "День X", title: "Перевозка", sub: "По чек-листу, не на эмоциях", sections: [
    { head: "Утро", tasks: ["Освободить проходы", "Снять зеркала", "Разобрать мебель"] },
    { head: "Команда", tasks: ["Что грузим первым", "Фото до погрузки", "Водитель знает адрес"] },
    { head: "Новое место", tasks: ["Осмотр ДО подписи", "Мебель → коробки", "Фото счётчиков"] }
  ]}
];
const state = {};

function showContent() {
  document.getElementById('content').classList.add('show');
  renderPlan();
  GRUZAPP.renderCTA('cta', 'moving', 'Переезд по этому плану?', 'Расчёт по фото, фиксированная цена, прямой контакт водителя.');
}

function renderPlan() {
  document.getElementById('days').innerHTML = plan.map((d, di) => `
    <div class="day"><div class="day-head"><div class="day-num">${d.label}</div><div class="day-title">${d.title}</div></div>
    <div class="day-sub">${d.sub}</div>
    ${d.sections.map((s, si) => `<div class="section-head">${s.head}</div>
    ${s.tasks.map((t, ti) => { const id=`${di}-${si}-${ti}`; const on=state[id]?'on':'';
    return `<div class="task ${on}" data-id="${id}"><div class="check-box ${on}">${state[id]?'✓':''}</div><div class="task-text">${t}</div></div>`; }).join('')}`).join('')}
    </div>`).join('');
  document.querySelectorAll('.task').forEach(t => t.addEventListener('click', () => { state[t.dataset.id] = !state[t.dataset.id]; renderPlan(); upd(); }));
}

function upd() {
  let tot=0; plan.forEach(d=>d.sections.forEach(s=>tot+=s.tasks.length));
  const done=Object.values(state).filter(Boolean).length;
  const p=tot>0?Math.round(done/tot*100):0;
  document.getElementById('pct').textContent=p+'%';
  document.getElementById('fill').style.width=p+'%';
}

document.getElementById('reset').addEventListener('click', () => { Object.keys(state).forEach(k=>delete state[k]); renderPlan(); upd(); });

window.addEventListener('DOMContentLoaded', () => GRUZAPP.renderGate('gate', 'moving', showContent));
</script>
</body>
</html>
