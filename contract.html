<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Как читать договор с перевозчиком | GRUZAPP</title>
<link rel="stylesheet" href="cta.css">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Unbounded:wght@500;700;900&family=Inter:wght@400;500;600&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Inter', sans-serif; background: #000; color: #fff; line-height: 1.6; }
  .container { max-width: 720px; margin: 0 auto; padding: 24px 20px 60px; }
  .logo { font-family: 'Unbounded', sans-serif; font-size: 18px; font-weight: 900; margin-bottom: 48px; }
  .logo span { color: #c6ff00; }
  .hero { padding: 32px 0 48px; text-align: center; }
  .hero-kicker { display: inline-block; background: rgba(198,255,0,0.12); color: #c6ff00; font-size: 12px; font-weight: 600; padding: 6px 14px; border-radius: 20px; margin-bottom: 24px; text-transform: uppercase; letter-spacing: 0.04em; }
  .hero h1 { font-family: 'Unbounded', sans-serif; font-size: clamp(28px, 5vw, 42px); font-weight: 700; line-height: 1.15; margin-bottom: 20px; }
  .hero h1 .accent { color: #c6ff00; }
  .hero p { font-size: 17px; color: #999; max-width: 580px; margin: 0 auto; }
  .content { display: none; }
  .content.show { display: block; }
  .legend { display: flex; gap: 16px; margin-bottom: 20px; }
  .lg { display: flex; align-items: center; gap: 6px; font-size: 12px; color: #999; }
  .dot { width: 8px; height: 8px; border-radius: 50%; }
  .dot.g { background: #c6ff00; }
  .dot.r { background: #fff; }
  .point { background: #0d0d0d; border: 1px solid #1f1f1f; border-radius: 12px; padding: 18px 20px; margin-bottom: 12px; }
  .point-head { display: flex; align-items: flex-start; gap: 12px; margin-bottom: 14px; }
  .point-num { width: 26px; height: 26px; background: #c6ff00; color: #000; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; flex-shrink: 0; }
  .point-title { font-size: 14px; font-weight: 600; }
  .flags { display: grid; gap: 8px; }
  .flag-row { display: flex; gap: 10px; padding: 12px 14px; border-radius: 8px; font-size: 13px; line-height: 1.5; }
  .flag-row.green { background: rgba(198,255,0,0.1); color: #c6ff00; border: 1px solid rgba(198,255,0,0.25); }
  .flag-row.red { background: rgba(255,255,255,0.05); color: #fff; border: 1px solid #2a2a2a; }
  .flag-icon { font-size: 14px; flex-shrink: 0; font-weight: 700; }
  .flag-label { font-weight: 700; font-size: 11px; text-transform: uppercase; display: block; margin-bottom: 2px; opacity: 0.7; }
  .checklist { background: #0d0d0d; border: 1px solid #1f1f1f; border-radius: 12px; padding: 22px; margin: 24px 0; }
  .checklist-title { font-size: 14px; font-weight: 600; margin-bottom: 14px; }
  .check-item { display: flex; align-items: center; gap: 10px; padding: 8px 0; font-size: 13px; cursor: pointer; }
  .check-box { width: 18px; height: 18px; border: 1.5px solid #444; border-radius: 4px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .check-box.on { background: #c6ff00; border-color: #c6ff00; color: #000; font-weight: 700; }
  .check-item.on .check-text { text-decoration: line-through; color: #666; }
  footer { text-align: center; margin-top: 48px; padding-top: 32px; border-top: 1px solid #1f1f1f; font-size: 12px; color: #666; }
</style>
</head>
<body>
<div class="container">
  <a href="/" style="text-decoration:none; color:inherit;"><div class="logo">GRUZ<span>APP</span></div></a>
  <div class="hero">
    <div class="hero-kicker">Проверка договора</div>
    <h1>Большинство договоров <span class="accent">не в твою пользу</span></h1>
    <p>6 пунктов — проверь свой договор прямо сейчас.</p>
  </div>

  <div id="gate"></div>

  <div id="content" class="content">
    <div class="legend"><div class="lg"><span class="dot g"></span>Должно быть</div><div class="lg"><span class="dot r"></span>Красный флаг</div></div>
    <div id="points"></div>
    <div class="checklist"><div class="checklist-title">Чек-лист при подписании</div><div id="check-list"></div></div>
    <div id="cta"></div>
  </div>

  <footer>GRUZAPP · © 2025</footer>
</div>

<script src="app.js"></script>
<script>
const pts = [
  { t: "Ответственность за груз", g: "Полная ответственность с приёмки до передачи", b: "Ограничена стоимостью фрахта" },
  { t: "Претензии", g: "Срок 7 дней, контакт ответственного", b: "В индивидуальном порядке" },
  { t: "Тарифы", g: "Изменение за 30 дней с уведомлением", b: "Без уведомления" },
  { t: "Субподряд", g: "Запрет или ответственность перевозчика", b: "Привлечение третьих лиц без ответственности" },
  { t: "Страхование", g: "Страховая, полис, сумма, случаи", b: "Застрахован без реквизитов" },
  { t: "Расторжение", g: "За 30 дней без штрафов", b: "Штрафы за досрочное расторжение" }
];
const cl = ["Ответственность прописана","Сроки претензий указаны","Тарифы — за 30 дней","Субподряд — с ответственностью","Страховка — с реквизитами","Расторжение без штрафов"];

function showContent() {
  document.getElementById('content').classList.add('show');
  document.getElementById('points').innerHTML = pts.map((p, i) => `
    <div class="point"><div class="point-head"><div class="point-num">${i+1}</div><div class="point-title">${p.t}</div></div>
    <div class="flags"><div class="flag-row green"><span class="flag-icon">✓</span><div><span class="flag-label">Должно быть</span>${p.g}</div></div>
    <div class="flag-row red"><span class="flag-icon">✕</span><div><span class="flag-label">Красный флаг</span>${p.b}</div></div></div></div>`).join('');
  document.getElementById('check-list').innerHTML = cl.map((c,i) => `<div class="check-item" data-i="${i}"><div class="check-box"></div><div class="check-text">${c}</div></div>`).join('');
  document.querySelectorAll('.check-item').forEach(item => item.addEventListener('click', () => {
    item.classList.toggle('on');
    const b = item.querySelector('.check-box'); b.classList.toggle('on'); b.textContent = b.classList.contains('on') ? '✓' : '';
  }));
  GRUZAPP.renderCTA('cta', 'contract', 'Хочешь правильный договор?', 'Пришлём образец GRUZAPP.');
}

window.addEventListener('DOMContentLoaded', () => GRUZAPP.renderGate('gate', 'contract', showContent));
</script>
</body>
</html>
